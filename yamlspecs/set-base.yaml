!include packages.yaml
---
versions: versions.yaml
bootstrap:
   - Test-SharedFork
   - Test-TCP
   - HTTP-Server-Simple
   - HTTP-Async
   - IO-Select
   - !eval "'{{bootstrap_ansible}}' if int({{site.os_release}}) <= 8 else ''"
   - !eval "'cffi' if {{site.os_release}} <= 8 else ''"
   - !OScmp "<,10,genders,"
bootstrap_ansible:
   - bcrypt
   - pynacl
   - !eval "'paramiko' if {{site.os_release}} >= 8 else ''"
   - ansible
build:
   - Crypt-Rijndael
   - Expect
   - HTML-Form
   - IO-Stty
   - Net-HTTPS-NB
   - scandir
   - pathlib2
   - OLE-Storage_Lite
   - Parse-RecDescent
   - Unicode-Map
   - Jcode
   - Spreadsheet-WriteExcel
   - Env
   - nmon
   - collectd
   - hostlist
   - zfs-auto-snapshot
   - !OScmp "<,10,pdsh,"
   - libcgroup
   - smem
